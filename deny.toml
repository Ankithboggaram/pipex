[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
unmaintained = "all"
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
